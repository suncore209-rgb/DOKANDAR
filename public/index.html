<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1B5E20" id="theme-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Dokandar">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Dokandar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pr:#1B5E20;--pr2:#2E7D32;--pr3:#388E3C;--prl:#E8F5E9;--prll:#F1F8F2;
  --ac:#E65100;--ac2:#F57C00;--acl:#FFF3E0;
  --gr:#2E7D32;--grl:#E8F5E9;--re:#C62828;--rel:#FFEBEE;
  --am:#F57F17;--aml:#FFFDE7;--bl:#1565C0;--bll:#E3F2FD;
  --bg:#F4F7F4;--card:#FFFFFF;
  --txt:#1A2E1C;--mt:#5A7A5C;--mt2:#9DB09E;
  --bdr:#DCE8DC;--bdr2:#EAF2EA;
  --shadow:0 2px 8px rgba(27,94,32,.08);--shadow2:0 8px 32px rgba(27,94,32,.14);
  --r:16px;--r2:24px;--nav-h:62px;--top-h:58px;
}
[data-theme="dark"]{
  --bg:#0D1A0F;--card:#162118;--txt:#E8F5E9;--mt:#7AB87C;--mt2:#4A6B4C;
  --bdr:#243426;--bdr2:#1E2E1F;--prll:#162118;--prl:#1E3020;
  --shadow:0 2px 8px rgba(0,0,0,.3);--shadow2:0 8px 32px rgba(0,0,0,.4);
  --acl:#2D1800;--rel:#2D0808;--aml:#2D2500;--grl:#0D2010;--bll:#0D1A2D;
}
html,body{height:100%;font-family:"Hind Siliguri",sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;overflow:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
#ovl{position:fixed;inset:0;background:rgba(13,26,15,.6);backdrop-filter:blur(4px);z-index:9000;display:none;align-items:center;justify-content:center}
#ovl.on{display:flex}
.ovl-box{background:var(--card);border-radius:20px;padding:28px 36px;text-align:center;box-shadow:var(--shadow2)}
.ovl-spin{width:40px;height:40px;border:3px solid var(--prl);border-top-color:var(--pr2);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ovl-txt{font-size:14px;color:var(--mt);font-weight:500}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1A2E1C;color:#E8F5E9;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:9500;white-space:nowrap;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#offline-bar{position:fixed;top:0;left:0;right:0;background:#B71C1C;color:#fff;text-align:center;padding:7px;font-size:12px;font-weight:600;z-index:8000;display:none}
#auth-wrap{position:fixed;inset:0;background:linear-gradient(160deg,#0D2E11 0%,#1B5E20 50%,#2E3B0E 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:24px;overflow-y:auto}
#auth-wrap.gone{display:none}
.auth-logo{width:110px;height:110px;border-radius:28px;object-fit:cover;box-shadow:0 12px 48px rgba(0,0,0,.4);margin-bottom:16px}
.auth-brand{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;color:#fff}
.auth-brand span{color:#FF8A00}
.auth-tagline{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:28px}
.auth-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:24px;width:100%;max-width:400px}
.auth-tabs{display:flex;background:rgba(0,0,0,.2);border-radius:12px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:.2s}
.auth-tab.on{background:rgba(255,255,255,.15);color:#fff}
.auth-lbl{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.auth-inp{width:100%;padding:12px 14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:12px;font-family:inherit;font-size:15px;color:#fff;outline:none;margin-bottom:12px;transition:.2s;-webkit-appearance:none}
.auth-inp:focus{border-color:rgba(255,255,255,.4)}
.auth-inp::placeholder{color:rgba(255,255,255,.3)}
.auth-inp-row{display:flex;gap:10px}.auth-inp-row>div{flex:1}
.btn-auth{width:100%;padding:14px;background:linear-gradient(135deg,#E65100,#FF8F00);border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:6px;box-shadow:0 4px 20px rgba(230,81,0,.4);transition:.15s}
.btn-auth:active{transform:scale(.97)}
#app{height:100vh;display:flex;flex-direction:column;display:none}
#topbar{height:var(--top-h);background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:10}
.top-logo{display:flex;align-items:center;gap:10px}
.top-logo img{width:34px;height:34px;border-radius:9px;object-fit:cover}
.top-shop{font-size:16px;font-weight:700}
.top-role{font-size:10px;color:var(--mt);font-weight:500}
.top-actions{display:flex;gap:8px}
.top-btn{width:36px;height:36px;border:none;background:var(--prll);border-radius:10px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--pr2)}
.top-btn:active{transform:scale(.92)}
#main{flex:1;overflow-y:auto;padding-bottom:2px}
#navbar{height:var(--nav-h);background:var(--card);border-top:1px solid var(--bdr);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px 4px;border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--mt2);transition:.15s}
.nav-btn.on{color:var(--pr2)}
.nav-btn.on .nav-icon{transform:translateY(-2px)}
.nav-icon{font-size:22px;line-height:1;transition:.15s}
.nav-lbl{font-size:10px;font-weight:600;margin-top:2px}
.pg{display:none;min-height:calc(100vh - var(--top-h) - var(--nav-h));padding:14px 14px 80px}
.pg.on{display:block}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--mt);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:12px;font-family:inherit;font-size:15px;color:var(--txt);background:var(--card);outline:none;transition:.15s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--pr2);box-shadow:0 0 0 3px rgba(46,125,50,.1)}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--bdr2);border-color:var(--bdr);color:var(--txt)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.inp-row{display:flex;gap:8px}.inp-row>*{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.96)}
.btn-pr{background:linear-gradient(135deg,var(--pr),var(--pr2));color:#fff;box-shadow:0 4px 14px rgba(27,94,32,.3)}
.btn-ac{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 4px 14px rgba(230,81,0,.3)}
.btn-re{background:var(--rel);color:var(--re)}
.btn-gr{background:var(--grl);color:var(--gr)}
.btn-gh{background:var(--bdr2);color:var(--mt)}
.btn-w{width:100%}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:9px}
.btn-lg{padding:15px 22px;font-size:16px;border-radius:14px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-p{padding:16px}
.ct{font-size:11px;font-weight:700;color:var(--mt);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.6px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.green::before{background:linear-gradient(90deg,var(--pr),var(--pr2))}
.stat-card.orange::before{background:linear-gradient(90deg,var(--ac),var(--ac2))}
.stat-card.red::before{background:linear-gradient(90deg,#C62828,#E53935)}
.stat-card.blue::before{background:linear-gradient(90deg,#1565C0,#1976D2)}
.stat-icon{font-size:20px;margin-bottom:6px;display:block}
.stat-lbl{font-size:11px;color:var(--mt);font-weight:600;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--mt);margin-top:3px}
.health-wrap{background:linear-gradient(135deg,var(--pr) 0%,var(--pr2) 60%,#388E3C 100%);border-radius:var(--r2);padding:20px;margin-bottom:12px;color:#fff;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(27,94,32,.3)}
.health-wrap::after{content:"";position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.health-ring{width:72px;height:72px;flex-shrink:0}
.health-info{flex:1}
.health-title{font-size:12px;font-weight:600;opacity:.8;margin-bottom:2px}
.health-score{font-size:32px;font-weight:700;line-height:1}
.health-msg{font-size:12px;opacity:.75;margin-top:4px}
.insight-card{background:linear-gradient(135deg,#0D2E11,#1B3D13);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid rgba(46,125,50,.3);position:relative;overflow:hidden}
.insight-card::before{content:"\1F916";position:absolute;right:16px;top:14px;font-size:28px;opacity:.3}
.insight-badge{background:rgba(230,81,0,.25);color:#FF8A65;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;border:1px solid rgba(230,81,0,.2)}
.insight-txt{font-size:14px;color:#C8E6C9;font-weight:500;line-height:1.5}
.chart-wrap{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700}
.chart-sub{font-size:11px;color:var(--mt)}
.bars{display:flex;align-items:flex-end;gap:6px;height:70px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:linear-gradient(180deg,var(--pr2),var(--pr));border-radius:4px 4px 0 0;transition:height .8s cubic-bezier(.34,1.56,.64,1);min-height:3px}
.bar.today{background:linear-gradient(180deg,var(--ac2),var(--ac))}
.bar-lbl{font-size:9px;color:var(--mt);text-align:center}
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.qa-btn{background:var(--card);border-radius:var(--r);padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid var(--bdr2);cursor:pointer;box-shadow:var(--shadow);transition:.15s;font-family:inherit}
.qa-btn:active{transform:scale(.93);background:var(--prll)}
.qa-icon{font-size:24px;line-height:1}
.qa-lbl{font-size:10px;font-weight:600;color:var(--mt);text-align:center}
.li{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:background .12s}
.li:last-child{border-bottom:none}
.li:active{background:var(--prll)}
.li-av{width:40px;height:40px;border-radius:12px;background:var(--prl);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-right:12px;font-weight:700}
.li-body{flex:1;min-width:0}
.li-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--mt);margin-top:1px}
.li-right{text-align:right;margin-left:10px;flex-shrink:0}
.li-amt{font-size:16px;font-weight:700}
.li-sub2{font-size:11px;color:var(--mt);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-gr{background:var(--grl);color:var(--gr)}
.badge-re{background:var(--rel);color:var(--re)}
.badge-am{background:var(--aml);color:var(--am)}
.badge-ac{background:var(--acl);color:var(--ac)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.srch{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:0 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.srch:focus-within{border-color:var(--pr2)}
.srch input{border:none;background:transparent;padding:11px 8px;font-size:14px;flex:1;box-shadow:none}
.srch-icon{font-size:16px;color:var(--mt2)}
.cat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--card);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--mt);white-space:nowrap;transition:.15s}
.cat-pill.on{background:var(--pr2);border-color:var(--pr2);color:#fff;box-shadow:0 3px 10px rgba(46,125,50,.3)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:22px 18px 36px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideup .25s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:18px;font-weight:700;color:var(--pr)}
.modal-close{width:32px;height:32px;border:none;background:var(--bdr2);border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mt)}
#pos-wrap{height:calc(100vh - var(--top-h) - var(--nav-h));display:flex;flex-direction:column;padding:0}
.pos-top{padding:12px 14px 0;flex-shrink:0}
.pos-res{max-height:220px;overflow-y:auto;background:var(--card);border-radius:14px;box-shadow:var(--shadow2);margin:0 14px 8px;display:none}
.pos-ri{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:background .1s;gap:12px}
.pos-ri:last-child{border-bottom:none}
.pos-ri:active{background:var(--prll)}
.pos-ri-name{font-weight:600;font-size:14px}
.pos-ri-info{font-size:12px;color:var(--mt)}
.pos-ri-price{font-weight:700;color:var(--pr2);font-size:15px;margin-left:auto}
.pos-ri-add{width:32px;height:32px;background:var(--prl);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--pr2);font-size:20px;flex-shrink:0}
.pos-cart{flex:1;overflow-y:auto;padding:0 14px}
.cart-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bdr2);background:var(--card)}
.cart-item:first-child{border-radius:14px 14px 0 0}
.cart-item:last-child{border-bottom:none;border-radius:0 0 14px 14px}
.ci-name{flex:1;font-weight:600;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-unit{font-size:11px;color:var(--mt)}
.qty-ctrl{display:flex;align-items:center;gap:5px}
.qty-btn{width:28px;height:28px;border:1.5px solid var(--bdr);background:var(--card);border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt);transition:.12s}
.qty-btn:active{background:var(--prl);border-color:var(--pr2)}
.qty-val{width:40px;text-align:center;font-weight:700;font-size:14px;border:1.5px solid var(--bdr);border-radius:8px;padding:4px 2px;background:var(--card);color:var(--txt)}
.ci-total{font-weight:700;color:var(--pr2);font-size:14px;min-width:55px;text-align:right}
.ci-del{font-size:16px;color:var(--mt2);cursor:pointer;padding:4px}
.ci-del:active{color:var(--re)}
.pos-empty{text-align:center;padding:48px 24px;color:var(--mt2)}
.pos-empty-icon{font-size:52px;margin-bottom:14px}
.pos-footer{background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.08);padding:16px 16px 20px;flex-shrink:0}
.pos-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mt);margin-bottom:5px}
.pos-row.big{font-size:19px;font-weight:700;color:var(--txt);margin-top:8px;padding-top:8px;border-top:1.5px solid var(--bdr)}
.pos-disc-inp{width:90px;text-align:right;padding:5px 10px;font-size:14px;font-weight:700;border-radius:9px}
.voice-btn{width:100%;padding:13px;border:2px dashed var(--bdr);border-radius:14px;background:var(--prll);font-family:inherit;font-size:14px;font-weight:600;color:var(--pr2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:.2s}
.voice-btn.listening{background:var(--rel);border-color:var(--re);color:var(--re);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.ai-entry{background:var(--prll);border:1.5px solid var(--bdr);border-radius:14px;padding:0 14px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-entry input{border:none;background:transparent;padding:12px 0;font-size:14px;flex:1;color:var(--txt);box-shadow:none}
.ai-entry-btn{background:var(--pr2);color:#fff;border:none;border-radius:9px;padding:7px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.pay-types{display:flex;gap:8px;margin-bottom:14px}
.pay-type{flex:1;padding:11px 6px;border:2px solid var(--bdr);border-radius:12px;background:var(--card);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;color:var(--mt)}
.pay-type.on{border-color:var(--pr2);background:var(--prl);color:var(--pr)}
.prog{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pr),var(--pr2));transition:.5s}
.prog-fill.warn{background:linear-gradient(90deg,var(--am),var(--ac))}
.prog-fill.bad{background:linear-gradient(90deg,var(--re),#E53935)}
.due-high{color:var(--re);font-weight:700}
.due-mid{color:var(--am);font-weight:700}
.due-ok{color:var(--gr);font-weight:700}
.ledger-row{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bdr2)}
.ledger-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.rep-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.rep-card{background:var(--card);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--shadow)}
.rep-val{font-size:18px;font-weight:700;margin-bottom:2px}
.rep-lbl{font-size:11px;color:var(--mt);font-weight:600}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bdr2)}
.toggle-track{width:44px;height:24px;background:var(--bdr);border-radius:12px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}

<script>
const S={shopId:"",shopName:"",role:"",products:[],categories:[],customers:[],suppliers:[]};
const CART={items:[],discount:0};
let curPage="dash",curCat="",dashData=null,_payType="cash",_purPayType="cash";
const num=v=>parseFloat(v)||0;
const fm=n=>num(n).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:2});
const iso=d=>d?String(d).slice(0,10):"";
const today=()=>iso(new Date());
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const v=id=>{const e=document.getElementById(id);return e?e.value.trim():""};
const vn=id=>num(v(id));
function fmtDate(d){if(!d)return"";try{return new Date(d+"T00:00:00").toLocaleDateString("bn-BD",{day:"numeric",month:"short",year:"numeric"});}catch{return d;}}
function toast(msg,dur=2800){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),dur);}
function showOvl(msg){document.getElementById("ovl-txt").textContent=msg||"লোড হচ্ছে...";document.getElementById("ovl").classList.add("on");}
function hideOvl(){document.getElementById("ovl").classList.remove("on");}
function hdrs(){return{"Content-Type":"application/json","x-shop-id":S.shopId};}
async function apiGet(u){try{const r=await fetch(u,{headers:{"x-shop-id":S.shopId}});return r.json();}catch{return{ok:false,offline:true,error:"অফলাইন"};}}
async function apiPost(u,b){try{const r=await fetch(u,{method:"POST",headers:hdrs(),body:JSON.stringify(b)});return r.json();}catch{return{ok:false,offline:true,error:"অফলাইন"};}}
async function apiPut(u,b){try{const r=await fetch(u,{method:"PUT",headers:hdrs(),body:JSON.stringify(b)});return r.json();}catch{return{ok:false,offline:true,error:"অফলাইন"};}}
async function apiDel(u,b){try{const r=await fetch(u,{method:"DELETE",headers:hdrs(),body:JSON.stringify(b)});return r.json();}catch{return{ok:false,offline:true,error:"অফলাইন"};}}
function toggleDark(){const d=document.documentElement.dataset.theme==="dark";document.documentElement.dataset.theme=d?"light":"dark";document.getElementById("dark-btn").textContent=d?"🌙":"☀️";localStorage.setItem("dkd-theme",d?"light":"dark");}
function applyTheme(){const t=localStorage.getItem("dkd-theme")||"light";document.documentElement.dataset.theme=t;document.getElementById("dark-btn").textContent=t==="dark"?"☀️":"🌙";}
function updateOnline(){document.getElementById("offline-bar").style.display=navigator.onLine?"none":"block";if(navigator.onLine&&"serviceWorker" in navigator)navigator.serviceWorker.controller?.postMessage("SYNC_NOW");}
window.addEventListener("online",()=>{updateOnline();toast("✅ ইন্টারনেট ফিরেছে");});
window.addEventListener("offline",updateOnline);
function authTab(t){document.getElementById("f-login").style.display=t==="login"?"":"none";document.getElementById("f-reg").style.display=t==="reg"?"":"none";document.querySelectorAll(".auth-tab").forEach((b,i)=>b.classList.toggle("on",i===(t==="login"?0:1)));}
async function doLogin(){const ph=v("lg-ph"),pin=v("lg-pin");if(!ph||!pin)return toast("ফোন ও PIN দিন");showOvl("লগইন হচ্ছে...");try{const r=await fetch("/api/auth?action=login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone:ph,pin})});const d=await r.json();hideOvl();if(!d.ok)return toast("❌ "+d.error);startSession(d);}catch(e){hideOvl();toast("❌ সংযোগ ব্যর্থ");}}
async function doReg(){const name=v("rg-nm"),phone=v("rg-ph"),addr=v("rg-ad"),op=v("rg-op"),cp=v("rg-cp");if(!name||!phone||!op)return toast("নাম, ফোন ও PIN দিন");if(op.length<4)return toast("PIN কমপক্ষে ৪ সংখ্যা");showOvl("নিবন্ধন হচ্ছে...");try{const r=await fetch("/api/auth?action=register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,phone,address:addr,ownerPin:op,cashierPin:cp})});const d=await r.json();hideOvl();if(!d.ok)return toast("❌ "+d.error);toast("✅ নিবন্ধন সম্পন্ন! স্বাগতম 🎉");startSession(d);}catch(e){hideOvl();toast("❌ সংযোগ ব্যর্থ");}}
function startSession(d){S.shopId=d.shopId;S.shopName=d.shopName;S.role=d.role;sessionStorage.setItem("dkd",JSON.stringify({shopId:d.shopId,shopName:d.shopName,role:d.role}));document.getElementById("auth-wrap").classList.add("gone");document.getElementById("app").style.display="flex";document.getElementById("top-shop").textContent=d.shopName;document.getElementById("top-role").textContent=d.role==="owner"?"👑 মালিক":"💼 ক্যাশিয়ার";initApp();}

function calcHealth(d){if(!d)return{score:0,msg:"ডেটা নেই"};let s=100;const msgs=[];
  if(d.today.sales===0){s-=15;msgs.push("আজ কোনো বিক্রয় হয়নি");}
  const dr=d.dues.customers/(d.today.sales||1);
  if(dr>2){s-=20;msgs.push("বাকির পরিমাণ বিক্রয়ের চেয়ে বেশি");}else if(dr>1){s-=10;msgs.push("বাকির পরিমাণ বেশি");}
  if(d.today.profit<0){s-=15;msgs.push("আজ লোকসান হচ্ছে");}
  if(d.lowStock?.length>3){s-=10;msgs.push(d.lowStock.length+"টি পণ্যের স্টক কম");}
  if(d.today.expenses>d.today.sales*0.5){s-=10;msgs.push("খরচ বেশি হচ্ছে");}
  s=Math.max(20,Math.min(100,s));
  const msg=msgs.length?msgs[0]:s>=75?"ব্যবসা ভালো চলছে!":"মনোযোগ প্রয়োজন";
  return{score:Math.round(s),msg};}

  if(d.dues.customers>5000)ins.push("⚠️ মোট ৳"+fm(d.dues.customers)+" বাকি পড়ে আছে — আজই কিছু কাস্টমারকে যোগাযোগ করুন");
  if(d.today.profit>0&&d.today.sales>0){const pct=Math.round(d.today.profit/d.today.sales*100);if(pct>25)ins.push("📈 আজ মুনাফার হার "+pct+"% — চমৎকার!");}
  if(d.today.profit<0)ins.push("📉 আজ লোকসান হচ্ছে — খরচ কমানোর চেষ্টা করুন");
  if(d.lowStock?.length>0)ins.push("📦 "+d.lowStock[0].name+" সহ "+d.lowStock.length+"টি পণ্যের স্টক শেষ হয়ে যাচ্ছে");
  if(d.today.sales>10000)ins.push("🎉 আজকের বিক্রয় ৳"+fm(d.today.sales)+" — দারুণ দিন!");
  if(d.today.txCount>10)ins.push("🔥 আজ "+d.today.txCount+"টি বিক্রয় — ব্যবসা জমজমাট!");

  return ins[Math.floor(Math.random()*ins.length)];}

function startVoice(){if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window))return toast("ব্রাউজার ভয়েস সাপোর্ট করে না");const btn=document.getElementById("voice-btn");if(_recognition){_recognition.stop();_recognition=null;btn.classList.remove("listening");btn.textContent="🎤 ভয়েস দিয়ে বিক্রয় লিখুন";return;}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;_recognition=new SR();_recognition.lang="bn-BD";_recognition.continuous=false;_recognition.interimResults=false;btn.classList.add("listening");btn.textContent="🔴 শুনছি... (বন্ধ করতে ক্লিক করুন)";_recognition.onresult=e=>{const txt=e.results[0][0].transcript;document.getElementById("ai-inp").value=txt;parseAI();};_recognition.onend=()=>{_recognition=null;btn.classList.remove("listening");btn.textContent="🎤 ভয়েস দিয়ে বিক্রয় লিখুন";};_recognition.onerror=()=>{_recognition=null;btn.classList.remove("listening");btn.textContent="🎤 ভয়েস দিয়ে বিক্রয় লিখুন";toast("ভয়েস ব্যর্থ");};_recognition.start();}
function parseAI(){const inp=document.getElementById("ai-inp");const txt=inp.value.trim();if(!txt)return;const bnMap={"০":0,"১":1,"২":2,"৩":3,"৪":4,"৫":5,"৬":6,"৭":7,"৮":8,"৯":9};const toEN=s=>s.replace(/[০-৯]/g,c=>bnMap[c]);const converted=toEN(txt);const nums=converted.match(/\d+(\.\d+)?/g)||[];if(!nums.length){toast("পরিমাণ বোঝা যায়নি");return;}const words=txt.toLowerCase().replace(/[০-৯\d.,টাকার]/g," ").split(/\s+/).filter(w=>w.length>1);let matched=null;for(const w of words){const p=S.products.find(p=>p.name.toLowerCase().includes(w));if(p){matched=p;break;}}if(!matched){toast("পণ্য খুঁজে পাওয়া যায়নি — তালিকা থেকে বাছাই করুন");inp.value="";return;}const qty=num(nums[0])||1;const price=matched.sellingPrice;const ex=CART.items.find(i=>i.productId===matched.id);if(ex){ex.qty+=qty;ex.total=ex.qty*ex.unitPrice;}else CART.items.push({productId:matched.id,productName:matched.name,unit:matched.unit,qty,unitPrice:price,total:qty*price});toast("✅ "+matched.name+" ("+qty+" "+matched.unit+") যোগ হয়েছে");inp.value="";renderCartFull();}

function buildCatRow(){const r=document.getElementById("cat-row");if(!r)return;r.innerHTML="<button class='cat-pill on' onclick="setCat('')">সব পণ্য</button>"+S.categories.map(c=>"<button class='cat-pill' onclick="setCat('"+c.id+"')">"+esc(c.name)+"</button>").join("");}

function renderProds(){const q=(v("prod-srch")||"").toLowerCase();const prods=S.products.filter(p=>(!curCat||p.categoryId===curCat)&&(!q||p.name.toLowerCase().includes(q)));const lowN=S.products.filter(p=>p.lowStockAlert>0&&p.stockQty<=p.lowStockAlert).length;let h="<div class='sec-hdr'><div style='font-size:14px;font-weight:700'>"+prods.length+"টি পণ্য</div>"+(lowN?"<span class='badge badge-re'>⚠️ "+lowN+"টি সংকট</span>":"")+"</div>";if(!prods.length){h+="<div class='empty'><div class='empty-icon'>📦</div><div class='empty-txt'>পণ্য নেই</div><button class='btn btn-pr' style='margin-top:14px' onclick='productModal(null)'>+ পণ্য যোগ করুন</button></div>";}else{h+="<div class='card' style='padding:0'>";prods.forEach(p=>{const pct=p.lowStockAlert>0?Math.min(100,Math.round(p.stockQty/p.lowStockAlert*100)):100;const cls=p.stockQty<=0?"bad":p.lowStockAlert>0&&p.stockQty<=p.lowStockAlert?"warn":"";const profit=p.sellingPrice-p.purchasePrice;h+="<div class='li' onclick="productModal('"+esc(p.id)+"')"><div class='li-av'>📦</div><div class='li-body'><div class='li-name'>"+esc(p.name)+"</div><div class='li-sub'>"+esc(p.categoryName||"—")+" · "+esc(p.unit)+"</div><div class='prog'><div class='prog-fill "+cls+"' style='width:"+pct+"%'></div></div><div style='font-size:11px;color:var(--mt);margin-top:3px'>স্টক: "+fm(p.stockQty)+" "+esc(p.unit)+"</div></div><div class='li-right'><div class='li-amt' style='color:var(--pr2)'>৳"+fm(p.sellingPrice)+"</div><div class='li-sub2' style='color:"+(profit>=0?"var(--gr)":"var(--re)")+"'>মুনাফা ৳"+fm(profit)+"</div></div></div>";});h+="</div>";}document.getElementById("prods-list").innerHTML=h;}
function productModal(id){const p=id?S.products.find(x=>x.id===id):null;const catOpts=S.categories.map(c=>"<option value='"+c.id+"|"+esc(c.name)+"'"+(p&&p.categoryId===c.id?" selected":"")+">"+esc(c.name)+"</option>").join("");const units=["পিস","কেজি","গ্রাম","লিটার","মিলি","ডজন","বান্ডেল","প্যাকেট","বাক্স","মিটার"];const uOpts=units.map(u=>"<option"+(p&&p.unit===u?" selected":"")+">"+u+"</option>").join("");openModal(p?"✏️ পণ্য সম্পাদনা":"➕ নতুন পণ্য","<div class='fg'><label class='fl'>পণ্যের নাম *</label><input id='pm-name' value='"+esc(p?.name||"")+"'></div><div class='fg'><label class='fl'>বিভাগ</label><select id='pm-cat'><option value=''>বিভাগ নেই</option>"+catOpts+"</select></div><div class='inp-row'><div class='fg'><label class='fl'>একক</label><select id='pm-unit'>"+uOpts+"</select></div><div class='fg'><label class='fl'>স্টক</label><input type='number' id='pm-stk' value='"+(p?.stockQty||0)+"' min='0'></div></div><div class='inp-row'><div class='fg'><label class='fl'>ক্রয় মূল্য ৳</label><input type='number' id='pm-buy' value='"+(p?.purchasePrice||0)+"' min='0'></div><div class='fg'><label class='fl'>বিক্রয় মূল্য ৳</label><input type='number' id='pm-sell' value='"+(p?.sellingPrice||0)+"' min='0'></div></div><div class='fg'><label class='fl'>স্টক সতর্কতা</label><input type='number' id='pm-alert' value='"+(p?.lowStockAlert||0)+"' min='0' placeholder='০ = বন্ধ'></div><div style='display:flex;gap:8px'><button class='btn btn-pr' style='flex:1' onclick="saveProd('"+esc(id||"")+"')">💾 সংরক্ষণ</button>"+(p?"<button class='btn btn-re' onclick="delProd('"+esc(id)+"')">🗑️</button>":"")+"<button class='btn btn-gh' onclick='closeModal()'>বাতিল</button></div>");}
async function saveProd(id){const name=v("pm-name");if(!name)return toast("পণ্যের নাম দিন");const cv=v("pm-cat");let ci="",cn="";if(cv){const pts=cv.split("|");ci=pts[0];cn=pts.slice(1).join("|");}const data={name,categoryId:ci,categoryName:cn,unit:v("pm-unit")||"পিস",purchasePrice:vn("pm-buy"),sellingPrice:vn("pm-sell"),stockQty:vn("pm-stk"),lowStockAlert:vn("pm-alert")};closeModal();showOvl("সংরক্ষণ হচ্ছে...");const r=id?await apiPut("/api/products",{id,...data}):await apiPost("/api/products",data);hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ সংরক্ষিত");await refreshData();buildCatRow();renderProds();}
async function delProd(id){if(!confirm("এই পণ্য মুছবেন?"))return;closeModal();showOvl("...");const r=await apiDel("/api/products",{id});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("🗑️ মুছা হয়েছে");await refreshData();renderProds();}
function renderKhata(){const custs=S.customers.slice().sort((a,b)=>b.totalDue-a.totalDue);const totalDue=custs.reduce((s,c)=>s+c.totalDue,0);let h="<div class='health-wrap' style='background:linear-gradient(135deg,#B71C1C,#C62828,#D32F2F)'><div style='font-size:48px'>📒</div><div class='health-info'><div class='health-title'>মোট পাওনা বাকি</div><div class='health-score'>৳"+fm(totalDue)+"</div><div class='health-msg'>"+custs.filter(c=>c.totalDue>0).length+"জন কাস্টমারের বাকি</div></div></div>";h+="<div class='srch'><span class='srch-icon'>🔍</span><input id='kh-srch' placeholder='কাস্টমার খুঁজুন...' oninput='filterKhata(this.value)'></div>";if(!custs.length)h+="<div class='empty'><div class='empty-icon'>📒</div><div class='empty-txt'>কোনো কাস্টমার নেই</div></div>";else h+="<div class='card' style='padding:0' id='kh-list'>"+custs.map(c=>khataRow(c)).join("")+"</div>";document.getElementById("khata-wrap").innerHTML=h;}
function khataRow(c){const cls=c.totalDue>5000?"due-high":c.totalDue>0?"due-mid":"due-ok";return "<div class='li' onclick="khataDetail('"+c.id+"')"><div class='li-av' style='background:"+(c.totalDue>0?"var(--rel)":"var(--grl)")+";color:"+(c.totalDue>0?"var(--re)":"var(--gr)")+"'>"+c.name.charAt(0).toUpperCase()+"</div><div class='li-body'><div class='li-name'>"+esc(c.name)+"</div><div class='li-sub'>"+(c.phone||"—")+"</div></div><div class='li-right'><div class='"+cls+"'>"+(c.totalDue>0?"৳"+fm(c.totalDue)+" বাকি":"✅ পরিষ্কার")+"</div></div></div>";}
function filterKhata(q){const list=document.getElementById("kh-list");if(!list)return;const lower=q.toLowerCase();const filtered=S.customers.filter(c=>!q||c.name.toLowerCase().includes(lower)||(c.phone&&c.phone.includes(q)));list.innerHTML=filtered.length?filtered.map(c=>khataRow(c)).join(""):"<div class='empty'><div class='empty-txt'>কেউ পাওয়া যায়নি</div></div>";}
async function khataDetail(custId){showOvl("লোড হচ্ছে...");const r=await apiGet("/api/customers?id="+custId);hideOvl();if(!r.ok&&!r.offline)return toast("লোড ব্যর্থ");const c=r.customer,ledger=r.ledger||[];openModal("📒 "+esc(c.name),"<div style='background:"+(c.totalDue>0?"var(--rel)":"var(--grl)")+";border-radius:14px;padding:16px;text-align:center;margin-bottom:16px'><div style='font-size:13px;color:var(--mt);font-weight:600'>মোট বাকি</div><div style='font-size:32px;font-weight:700;color:"+(c.totalDue>0?"var(--re)":"var(--gr)")+"'>৳"+fm(c.totalDue)+"</div><div style='font-size:12px;color:var(--mt)'>"+(c.phone||"")+(c.address?" · "+esc(c.address):"")+"</div></div><div style='display:flex;gap:8px;margin-bottom:16px'><button class='btn btn-pr' style='flex:1' onclick="closeModal();paymentModal('"+c.id+"','"+esc(c.name)+"',"+c.totalDue+")">💰 পেমেন্ট নিন</button><button class='btn btn-gh btn-sm' onclick="closeModal();editCustModal('"+c.id+"','"+esc(c.name)+"','"+esc(c.phone||"")+"','"+esc(c.address||"")+"')">✏️</button></div><div class='ct' style='margin-top:0'>লেনদেনের ইতিহাস</div><div style='max-height:280px;overflow-y:auto'>"+(ledger.length?ledger.map(l=>"<div class='ledger-row'><div class='ledger-dot' style='background:"+(l.type==="credit_sale"?"var(--re)":"var(--gr)")+"'></div><div style='flex:1'><div style='font-weight:600;font-size:13px'>"+(l.type==="credit_sale"?"📦 বিক্রয় বাকি":"💰 পেমেন্ট")+"</div><div style='font-size:12px;color:var(--mt)'>"+fmtDate(l.date)+(l.note?" · "+esc(l.note):"")+"</div></div><div style='font-weight:700;color:"+(l.type==="credit_sale"?"var(--re)":"var(--gr)")+"'>"+(l.type==="credit_sale"?"+":"-")+"৳"+fm(l.amount)+"</div></div>").join(""):"<div class='empty'><div class='empty-txt'>কোনো ইতিহাস নেই</div></div>")+"</div>");}
function addCustModal(){openModal("➕ নতুন কাস্টমার","<div class='fg'><label class='fl'>নাম *</label><input id='nc-nm' placeholder='কাস্টমারের নাম'></div><div class='fg'><label class='fl'>ফোন</label><input id='nc-ph' type='tel' placeholder='01XXXXXXXXX'></div><div class='fg'><label class='fl'>ঠিকানা</label><input id='nc-ad' placeholder='ঐচ্ছিক'></div><div style='display:flex;gap:8px'><button class='btn btn-pr' style='flex:1' onclick='saveCust()'>💾 যোগ করুন</button><button class='btn btn-gh' onclick='closeModal()'>বাতিল</button></div>");}
async function saveCust(){const name=v("nc-nm");if(!name)return toast("নাম দিন");showOvl("...");const r=await apiPost("/api/customers",{name,phone:v("nc-ph"),address:v("nc-ad")});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ কাস্টমার যোগ হয়েছে");await refreshData();closeModal();renderKhata();}
function editCustModal(id,name,phone,addr){openModal("✏️ তথ্য পরিবর্তন","<div class='fg'><label class='fl'>নাম</label><input id='ec-nm' value='"+name+"'></div><div class='fg'><label class='fl'>ফোন</label><input id='ec-ph' value='"+phone+"'></div><div class='fg'><label class='fl'>ঠিকানা</label><input id='ec-ad' value='"+addr+"'></div><div style='display:flex;gap:8px'><button class='btn btn-pr' style='flex:1' onclick="updateCust('"+id+"')">💾 সংরক্ষণ</button><button class='btn btn-gh' onclick='closeModal()'>বাতিল</button></div>");}
async function updateCust(id){const r=await apiPut("/api/customers",{id,name:v("ec-nm"),phone:v("ec-ph"),address:v("ec-ad")});if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ আপডেট হয়েছে");await refreshData();closeModal();renderKhata();}
function paymentModal(custId,custName,due){openModal("💰 পেমেন্ট — "+custName,"<div style='background:var(--rel);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px'><div style='font-size:12px;color:var(--re);font-weight:600'>মোট বাকি</div><div style='font-size:28px;font-weight:700;color:var(--re)'>৳"+fm(due)+"</div></div><div class='fg'><label class='fl'>পরিমাণ ৳ *</label><input type='number' id='cp-amt' value='"+due+"' min='1'></div><div class='fg'><label class='fl'>তারিখ</label><input type='date' id='cp-dt' value='"+today()+"'></div><div class='fg'><label class='fl'>নোট</label><input id='cp-nt' placeholder='ঐচ্ছিক'></div><div style='display:flex;gap:8px'><button class='btn btn-pr' style='flex:1' onclick="doPayment('"+custId+"')">✅ পেমেন্ট নিন</button><button class='btn btn-gh' onclick='closeModal()'>বাতিল</button></div>");}
async function doPayment(custId){const amt=vn("cp-amt");if(!amt)return toast("পরিমাণ দিন");showOvl("...");const r=await apiPost("/api/customers",{action:"payment",customerId:custId,amount:amt,date:v("cp-dt"),note:v("cp-nt")});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ পেমেন্ট নেওয়া হয়েছে! বাকি: ৳"+fm(r.newDue||0));await refreshData();closeModal();renderKhata();}
function renderSuppliers(){const total=S.suppliers.reduce((s,x)=>s+x.totalDue,0);let h="<div class='ct' style='margin-top:0'>🏭 সাপ্লায়ার</div><div class='stat-card orange' style='margin-bottom:10px'><div class='stat-lbl'>মোট দেব</div><div class='stat-val' style='color:var(--re)'>৳"+fm(total)+"</div></div><button class='btn btn-pr btn-w' style='margin-bottom:10px' onclick='addSuppModal()'>➕ নতুন সাপ্লায়ার</button>";if(!S.suppliers.length)h+="<div class='empty'><div class='empty-icon'>🏭</div><div class='empty-txt'>কোনো সাপ্লায়ার নেই</div></div>";else h+="<div class='card' style='padding:0'>"+S.suppliers.map(s=>"<div class='li' onclick="suppPayModal('"+s.id+"','"+esc(s.name)+"',"+s.totalDue+")"><div class='li-av'>🏭</div><div class='li-body'><div class='li-name'>"+esc(s.name)+"</div><div class='li-sub'>"+(s.phone||"—")+"</div></div><div class='li-right'><div class='"+(s.totalDue>0?"due-high":"due-ok")+"'>"+(s.totalDue>0?"দেব ৳"+fm(s.totalDue):"✅ পরিষ্কার")+"</div></div></div>").join("")+"</div>";document.getElementById("sub-content").innerHTML=h;}
function addSuppModal(){openModal("➕ নতুন সাপ্লায়ার","<div class='fg'><label class='fl'>নাম *</label><input id='ns-nm'></div><div class='fg'><label class='fl'>ফোন</label><input id='ns-ph' type='tel'></div><div class='fg'><label class='fl'>ঠিকানা</label><input id='ns-ad'></div><div style='display:flex;gap:8px'><button class='btn btn-pr' style='flex:1' onclick='saveSupp()'>💾 যোগ করুন</button><button class='btn btn-gh' onclick='closeModal()'>বাতিল</button></div>");}
async function saveSupp(){const name=v("ns-nm");if(!name)return toast("নাম দিন");showOvl("...");const r=await apiPost("/api/suppliers",{name,phone:v("ns-ph"),address:v("ns-ad")});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ যোগ হয়েছে");await refreshData();closeModal();renderSuppliers();}
function suppPayModal(id,name,due){openModal("💰 সাপ্লায়ার পেমেন্ট — "+name,"<div style='background:var(--rel);border-radius:14px;padding:14px;text-align:center;margin-bottom:14px'><div style='font-size:12px;color:var(--re)'>মোট দেব</div><div style='font-size:26px;font-weight:700;color:var(--re)'>৳"+fm(due)+"</div></div><div class='fg'><label class='fl'>পরিমাণ ৳</label><input type='number' id='sp-amt' value='"+due+"'></div><div class='fg'><label class='fl'>তারিখ</label><input type='date' id='sp-dt' value='"+today()+"'></div><div class='fg'><label class='fl'>নোট</label><input id='sp-nt'></div><div style='display:flex;gap:8px'><button class='btn btn-pr' style='flex:1' onclick="doSuppPay('"+id+"')">✅ পেমেন্ট দিন</button><button class='btn btn-gh' onclick='closeModal()'>বাতিল</button></div>");}
async function doSuppPay(id){const amt=vn("sp-amt");if(!amt)return toast("পরিমাণ দিন");showOvl("...");const r=await apiPost("/api/suppliers",{action:"payment",supplierId:id,amount:amt,date:v("sp-dt"),note:v("sp-nt")});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ পেমেন্ট দেওয়া হয়েছে");await refreshData();closeModal();renderSuppliers();}
const PC={items:[]};
function renderPurchasePage(){const suppOpts=S.suppliers.map(s=>"<option value='"+s.id+"|"+esc(s.name)+"'>"+esc(s.name)+"</option>").join("");let h="<div class='ct' style='margin-top:0'>📥 নতুন ক্রয়</div><div class='card card-p'><div class='fg'><label class='fl'>সাপ্লায়ার</label><select id='pur-sp'><option value=''>-- নির্বাচন করুন --</option>"+suppOpts+"</select></div><div class='fg'><label class='fl'>তারিখ</label><input type='date' id='pur-dt' value='"+today()+"'></div><div class='ct'>পণ্য যোগ করুন</div><div class='srch'><span class='srch-icon'>🔍</span><input id='pur-srch' placeholder='পণ্য খুঁজুন...' oninput='purSearch(this.value)' autocomplete='off'></div><div id='pur-res' style='display:none;max-height:160px;overflow-y:auto;border-radius:12px;border:1.5px solid var(--bdr);margin-bottom:8px'></div><div id='pur-cart'></div><div class='pay-types'><button class='pay-type on' id='pp-cash' onclick="purPT('cash')">💵 নগদ</button><button class='pay-type' id='pp-credit' onclick="purPT('credit')">📒 বাকি</button><button class='pay-type' id='pp-partial' onclick="purPT('partial')">⚡ আংশিক</button></div><div id='pur-partial-wrap' style='display:none'><div class='fg'><label class='fl'>নগদ দিলাম ৳</label><input type='number' id='pur-paid' placeholder='0'></div></div><div class='fg'><label class='fl'>নোট</label><input id='pur-nt'></div><button class='btn btn-pr btn-w' onclick='savePurchase()'>✅ ক্রয় সম্পন্ন করুন</button></div>";PC.items=[];document.getElementById("sub-content").innerHTML=h;}
function purSearch(q){const res=document.getElementById("pur-res");if(!q){res.style.display="none";return;}const m=S.products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);if(!m.length){res.style.display="none";return;}res.innerHTML=m.map(p=>"<div class='pos-ri' onclick="purAdd('"+esc(p.id)+"')"><div class='pos-ri-name'>"+esc(p.name)+"</div><div class='pos-ri-info'>স্টক: "+fm(p.stockQty)+"</div><div class='pos-ri-add'>+</div></div>").join("");res.style.display="block";}
function purAdd(pid){const p=S.products.find(x=>x.id===pid);if(!p)return;const ex=PC.items.find(i=>i.productId===pid);if(ex)ex.qty+=1;else PC.items.push({productId:p.id,productName:p.name,unit:p.unit,qty:1,unitPrice:p.purchasePrice||0,total:p.purchasePrice||0});document.getElementById("pur-srch").value="";document.getElementById("pur-res").style.display="none";renderPurCart();}
function renderPurCart(){if(!PC.items.length){document.getElementById("pur-cart").innerHTML="";return;}let h="<div class='card' style='padding:0;margin-bottom:10px'>";PC.items.forEach((item,i)=>{h+="<div class='cart-item'><div class='ci-name'>"+esc(item.productName)+"</div><div class='qty-ctrl'><button class='qty-btn' onclick='purQty("+i+",-1)'>−</button><input class='qty-val' type='number' value='"+item.qty+"' onchange='purQtySet("+i+",this.value)'><button class='qty-btn' onclick='purQty("+i+",1)'>+</button></div><input type='number' value='"+item.unitPrice+"' placeholder='মূল্য' style='width:85px;text-align:right;padding:5px 8px;font-size:13px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt)' onchange='purPrice("+i+",this.value)'><div class='ci-total'>৳"+fm(item.total)+"</div><div class='ci-del' onclick='PC.items.splice("+i+",1);renderPurCart()'>🗑️</div></div>";});const tot=PC.items.reduce((s,i)=>s+i.total,0);h+="<div style='padding:12px 16px;font-size:16px;font-weight:700;text-align:right;color:var(--pr2)'>মোট: ৳"+fm(tot)+"</div></div>";document.getElementById("pur-cart").innerHTML=h;}
function purQty(i,d){const item=PC.items[i];item.qty=Math.max(1,item.qty+d);item.total=item.qty*item.unitPrice;renderPurCart();}
function purQtySet(i,val){const item=PC.items[i];item.qty=Math.max(1,num(val));item.total=item.qty*item.unitPrice;renderPurCart();}
function purPrice(i,val){const item=PC.items[i];item.unitPrice=num(val);item.total=item.qty*item.unitPrice;renderPurCart();}
function purPT(t){_purPayType=t;["cash","credit","partial"].forEach(x=>{const b=document.getElementById("pp-"+x);if(b)b.classList.toggle("on",x===t);});const w=document.getElementById("pur-partial-wrap");if(w)w.style.display=t==="partial"?"":"none";}
async function savePurchase(){if(!PC.items.length)return toast("পণ্য যোগ করুন");const sv=v("pur-sp");let sid2="",snm="";if(sv){const pts=sv.split("|");sid2=pts[0];snm=pts.slice(1).join("|");}const total=PC.items.reduce((s,i)=>s+i.total,0);const paid=_purPayType==="cash"?total:_purPayType==="credit"?0:num(v("pur-paid"));showOvl("ক্রয় সংরক্ষণ হচ্ছে...");const r=await apiPost("/api/purchases",{items:PC.items,supplierId:sid2,supplierName:snm,date:v("pur-dt")||today(),paymentType:_purPayType,paidAmount:paid,note:v("pur-nt")});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ ক্রয় সম্পন্ন! স্টক আপডেট হয়েছে");await refreshData();renderPurchasePage();}
const EXP_CATS=["বেতন","ভাড়া","বিদ্যুৎ","পরিবহন","বিজ্ঞাপন","মেরামত","খাবার","অন্যান্য"];
async function renderExpenses(){showOvl("লোড হচ্ছে...");const r=await apiGet("/api/expenses?from="+today().slice(0,8)+"01&to="+today());hideOvl();const exps=r.expenses||[];const total=exps.reduce((s,e)=>s+e.amount,0);const catOpts=EXP_CATS.map(c=>"<option>"+c+"</option>").join("");let h="<div class='ct' style='margin-top:0'>💸 খরচ</div><div class='card card-p' style='margin-bottom:10px'><div style='font-size:14px;font-weight:700;margin-bottom:12px'>➕ নতুন খরচ</div><div class='inp-row'><div class='fg'><label class='fl'>বিভাগ</label><select id='ex-cat'>"+catOpts+"</select></div><div class='fg'><label class='fl'>পরিমাণ ৳ *</label><input type='number' id='ex-amt' placeholder='০'></div></div><div class='inp-row'><div class='fg'><label class='fl'>তারিখ</label><input type='date' id='ex-dt' value='"+today()+"'></div><div class='fg'><label class='fl'>নোট</label><input id='ex-nt' placeholder='ঐচ্ছিক'></div></div><button class='btn btn-ac btn-w' onclick='addExp()'>💾 খরচ যোগ করুন</button></div><div class='stat-card red' style='margin-bottom:10px'><div class='stat-lbl'>এই মাসের মোট খরচ</div><div class='stat-val' style='color:var(--re)'>৳"+fm(total)+"</div></div>";if(exps.length){h+="<div class='card' style='padding:0'>"+exps.map(e=>"<div class='li'><div class='li-av' style='background:var(--rel)'>💸</div><div class='li-body'><div class='li-name'>"+esc(e.category)+"</div><div class='li-sub'>"+fmtDate(e.date)+(e.note?" · "+esc(e.note):"")+"</div></div><div class='li-right'><div class='li-amt' style='color:var(--re)'>৳"+fm(e.amount)+"</div><div style='font-size:11px;cursor:pointer;color:var(--mt2)' onclick="delExp('"+e.id+"')">🗑️</div></div></div>").join("")+"</div>";}else h+="<div class='empty'><div class='empty-icon'>💸</div><div class='empty-txt'>আজ কোনো খরচ নেই</div></div>";document.getElementById("sub-content").innerHTML=h;}
async function addExp(){const amt=vn("ex-amt");if(!amt)return toast("পরিমাণ দিন");showOvl("...");const r=await apiPost("/api/expenses",{category:v("ex-cat"),amount:amt,date:v("ex-dt")||today(),note:v("ex-nt")});hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);toast("✅ খরচ যোগ হয়েছে");renderExpenses();}
async function delExp(id){if(!confirm("মুছবেন?"))return;showOvl("...");await apiDel("/api/expenses",{id});hideOvl();toast("🗑️ মুছা হয়েছে");renderExpenses();}
async function renderReport(){const fd=today().slice(0,8)+"01";let h="<div class='ct' style='margin-top:0'>📊 রিপোর্ট</div><div class='card card-p'><div class='inp-row'><div class='fg'><label class='fl'>শুরু</label><input type='date' id='rp-fr' value='"+fd+"'></div><div class='fg'><label class='fl'>শেষ</label><input type='date' id='rp-to' value='"+today()+"'></div></div><button class='btn btn-pr btn-w' onclick='loadReport()'>📊 রিপোর্ট দেখুন</button></div><div id='rep-result'></div>";document.getElementById("sub-content").innerHTML=h;}
async function loadReport(){const from=v("rp-fr"),to=v("rp-to");if(!from||!to)return toast("তারিখ দিন");showOvl("রিপোর্ট তৈরি হচ্ছে...");const r=await apiGet("/api/report?from="+from+"&to="+to);hideOvl();if(!r.ok&&!r.offline)return toast("❌ "+r.error);let h="<div style='text-align:center;font-size:13px;color:var(--mt);margin:10px 0'>"+fmtDate(from)+" — "+fmtDate(to)+"</div><div class='rep-grid'><div class='rep-card'><div class='rep-val' style='color:var(--pr2)'>৳"+fm(r.sales?.total)+"</div><div class='rep-lbl'>মোট বিক্রয়</div></div><div class='rep-card'><div class='rep-val' style='color:"+(r.netProfit>=0?"var(--gr)":"var(--re)")+"'>৳"+fm(r.netProfit)+"</div><div class='rep-lbl'>নিট মুনাফা</div></div><div class='rep-card'><div class='rep-val' style='color:var(--re)'>৳"+fm(r.expenses?.total)+"</div><div class='rep-lbl'>মোট খরচ</div></div><div class='rep-card'><div class='rep-val' style='color:var(--gr)'>৳"+fm(r.sales?.cash)+"</div><div class='rep-lbl'>নগদ</div></div><div class='rep-card'><div class='rep-val' style='color:var(--re)'>৳"+fm(r.sales?.credit)+"</div><div class='rep-lbl'>বাকি বিক্রয়</div></div><div class='rep-card'><div class='rep-val'>"+( r.sales?.count||0)+"টি</div><div class='rep-lbl'>লেনদেন</div></div></div>";if(r.topProducts?.length){h+="<div class='ct'>🏆 সেরা পণ্য</div><div class='card' style='padding:0'>";r.topProducts.forEach((p,i)=>{h+="<div class='li'><div class='li-av'>"+( i+1)+"</div><div class='li-body'><div class='li-name'>"+esc(p.name)+"</div><div class='li-sub'>পরিমাণ: "+fm(p.qty)+"</div></div><div class='li-right'><div class='li-amt' style='color:var(--pr2)'>৳"+fm(p.revenue)+"</div></div></div>";});h+="</div>";}const ec=r.expenses?.byCategory||{};if(Object.keys(ec).length){h+="<div class='ct'>💸 খরচের বিভাগ</div><div class='card' style='padding:0'>";Object.entries(ec).sort((a,b)=>b[1]-a[1]).forEach(([k,val])=>{h+="<div class='li'><div class='li-av'>💸</div><div class='li-body'><div class='li-name'>"+esc(k)+"</div></div><div class='li-right'><div class='li-amt' style='color:var(--re)'>৳"+fm(val)+"</div></div></div>";});h+="</div>";}h+="<button class='btn btn-gh btn-w' style='margin-top:12px' onclick='window.print()'>🖨️ PDF / প্রিন্ট করুন</button>";document.getElementById("rep-result").innerHTML=h;}
function showSettings(){openModal("⚙️ সেটিংস","<div style='text-align:center;background:var(--prl);border-radius:14px;padding:20px;margin-bottom:16px'><div style='font-size:14px;font-weight:700'>"+esc(S.shopName)+"</div><div class='badge badge-gr' style='margin-top:6px'>"+(S.role==="owner"?"👑 মালিক":"💼 ক্যাশিয়ার")+"</div></div><div class='toggle-row'><div><div style='font-weight:600'>🌙 ডার্ক মোড</div><div style='font-size:12px;color:var(--mt)'>চোখের আরাম</div></div><div class='toggle-track"+(document.documentElement.dataset.theme==="dark"?" on":"")+"' onclick='toggleDark();this.classList.toggle("on")'><div class='toggle-thumb'></div></div></div>"+(S.role==="owner"?"<div class='ct'>তথ্য পরিবর্তন</div><div class='fg'><label class='fl'>দোকানের নাম</label><input id='st-nm' value='"+esc(S.shopName)+"'></div><div class='inp-row'><div class='fg'><label class='fl'>মালিকের নতুন PIN</label><input type='password' id='st-op' placeholder='খালি = অপরিবর্তিত'></div><div class='fg'><label class='fl'>ক্যাশিয়ার PIN</label><input type='password' id='st-cp' placeholder='খালি = অপরিবর্তিত'></div></div><button class='btn btn-pr btn-w' style='margin-bottom:10px' onclick='saveSettings()'>💾 সেটিংস সংরক্ষণ</button>":"")+"<button class='btn btn-re btn-w' onclick='doLogout()'>🚪 লগআউট</button>");}
async function saveSettings(){const d={};const nm=v("st-nm");if(nm)d.shopName=nm;const op=v("st-op");if(op){if(op.length<4)return toast("PIN ৪ সংখ্যার কম হবে না");d.ownerPin=op;}const cp=v("st-cp");if(cp)d.cashierPin=cp;showOvl("...");const r=await fetch("/api/auth?action=update-pins",{method:"POST",headers:hdrs(),body:JSON.stringify(d)});const res=await r.json();hideOvl();if(!res.ok)return toast("❌ "+res.error);if(d.shopName){S.shopName=d.shopName;document.getElementById("top-shop").textContent=d.shopName;}toast("✅ সেটিংস আপডেট হয়েছে");closeModal();}
function openModal(title,body){closeModal();const bg=document.createElement("div");bg.className="modal-bg";bg.id="modal-bg";bg.onclick=e=>{if(e.target===bg)closeModal();};bg.innerHTML="<div class='modal'><div class='modal-hdr'><div class='modal-title'>"+title+"</div><button class='modal-close' onclick='closeModal()'>✕</button></div>"+body+"</div>";document.body.appendChild(bg);}
function closeModal(){const m=document.getElementById("modal-bg");if(m)m.remove();}
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});navigator.serviceWorker.addEventListener("message",e=>{if(e.data==="SYNC_DONE")toast("✅ ডেটা সিঙ্ক হয়েছে");});}
applyTheme();
updateOnline();
document.getElementById("lg-pin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
(function boot(){const s=sessionStorage.getItem("dkd");if(s){try{const d=JSON.parse(s);S.shopId=d.shopId;S.shopName=d.shopName;S.role=d.role;document.getElementById("auth-wrap").classList.add("gone");document.getElementById("app").style.display="flex";document.getElementById("top-shop").textContent=d.shopName;document.getElementById("top-role").textContent=d.role==="owner"?"👑 মালিক":"💼 ক্যাশিয়ার";initApp();}catch{sessionStorage.removeItem("dkd");}}})();
</script>
